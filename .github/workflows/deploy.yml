name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Inject Firebase config into static app
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          set -euo pipefail

          required_vars=(
            FIREBASE_API_KEY
            FIREBASE_AUTH_DOMAIN
            FIREBASE_PROJECT_ID
            FIREBASE_STORAGE_BUCKET
            FIREBASE_MESSAGING_SENDER_ID
            FIREBASE_APP_ID
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "Missing required GitHub Actions secret: ${var_name}"
              exit 1
            fi
          done

          sed -i "s|REPLACE_WITH_FIREBASE_API_KEY|${FIREBASE_API_KEY}|g" firebase-init.js
          sed -i "s|REPLACE_WITH_FIREBASE_AUTH_DOMAIN|${FIREBASE_AUTH_DOMAIN}|g" firebase-init.js
          sed -i "s|REPLACE_WITH_FIREBASE_PROJECT_ID|${FIREBASE_PROJECT_ID}|g" firebase-init.js
          sed -i "s|REPLACE_WITH_FIREBASE_STORAGE_BUCKET|${FIREBASE_STORAGE_BUCKET}|g" firebase-init.js
          sed -i "s|REPLACE_WITH_FIREBASE_MESSAGING_SENDER_ID|${FIREBASE_MESSAGING_SENDER_ID}|g" firebase-init.js
          sed -i "s|REPLACE_WITH_FIREBASE_APP_ID|${FIREBASE_APP_ID}|g" firebase-init.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
